# Coding agent: plan → code/review loop until done.
#
# Run: python examples/composer/coding/run.py

defaults:
  model:
    provider: openai
    name: gpt-5.4

tools:
  exit:
    builtin: "exit_loop"
  filesystem:
    builtin: "filesystem"
  shell:
    builtin: "shell"

agents:
  planner:
    type: llm
    description: "Plans the implementation steps for the coder agent."
    instructions: |
      You are a planning agent inside an automated pipeline. Your output is read
      by a coder agent, NOT a human. Output a numbered list of concrete steps
      the coder should execute. Each step must be an actionable command or file
      operation — never tell the user to "open a terminal" or "run this command
      yourself". Example format:
        1. Create directory /tmp/demo/
        2. Write file /tmp/demo/index.html with the following content: ...
        3. Start the server with `python -m http.server 8080 --directory /tmp/demo`

  coder:
    type: llm
    description: "Implements code changes with filesystem and shell access."
    instructions: |
      You are a coding agent. Follow the plan from the previous step exactly.
      Use the write_file / read_file tools to create and read files.
      Use the shell tool to run commands (start servers, install packages, etc.).
      Do NOT ask the user to do anything — execute every step yourself.
      After creating files, read them back to verify correctness.
    tools:
      - filesystem
      - shell

  reviewer:
    type: llm
    description: "Reviews changes and approves or requests fixes."
    instructions: |
      Review the work done so far. Use read_file to check that files exist and
      are correct. If everything looks good, call the exit_loop tool to finish.
      If issues remain, describe exactly what the coder needs to fix.
    tools:
      - exit
      - filesystem

  dev_loop:
    type: loop
    agents: [coder, reviewer]
    max_iterations: 5

  coordinator:
    type: sequential
    agents: [planner, dev_loop]

main_agent: coordinator

runner:
  app_name: coding-agent
  session_service: memory
