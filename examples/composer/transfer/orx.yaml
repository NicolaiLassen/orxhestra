# Compose a multi-agent team with transfer routing.
#
# Run: python examples/composer/transfer/run.py

defaults:
  model:
    provider: openai
    name: gpt-5.4
    api_key: ${OPENAI_API_KEY}

# Reusable tool definitions
tools:
  search:
    function: "examples.composer.transfer.tools.search_web"
  weather:
    function: "examples.composer.transfer.tools.get_weather"
  lookup_order:
    function: "examples.composer.transfer.tools.lookup_order"
  check_billing:
    function: "examples.composer.transfer.tools.check_billing"

# Named skill definitions (referenced by agents)
skills:
  triage_guidelines:
    name: triage_guidelines
    description: "Guidelines for routing customer requests."
    content: |
      Route order/shipping/returns to sales.
      Route payments/invoices/subscriptions to billing.
      Route general questions to researcher.

# Agent definitions
agents:
  researcher:
    type: llm
    description: "Researches topics using web search."
    instructions: |
      You are a research assistant. Use the search tool to find
      information and return structured findings.
    tools:
      - search
      - weather

  sales:
    type: llm
    description: "Handles order inquiries, shipping, and returns."
    instructions: You are a sales specialist. Help with order questions.
    tools:
      - lookup_order

  billing:
    type: llm
    description: "Handles billing, payments, and subscription questions."
    instructions: You are a billing specialist. Help with payment questions.
    tools:
      - check_billing

  triage:
    type: llm
    description: "Routes customer requests to the right specialist."
    instructions: |
      You are a triage agent. Analyze the customer's request and
      route to the appropriate specialist.
    tools:
      - transfer:
          targets:
            - sales
            - billing
            - researcher
    skills:
      - triage_guidelines

main_agent: triage

runner:
  app_name: composer-demo
  session_service: memory
