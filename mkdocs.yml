site_name: langchain-adk
site_description: A LangChain-powered Agent Development Kit
site_url: https://nicolailassen.github.io/langchain-adk/
repo_url: https://github.com/NicolaiLassen/langchain-adk
repo_name: NicolaiLassen/langchain-adk

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
  logo: assets/logo.svg
  favicon: assets/logo.svg

plugins:
  - search
  - mermaid2

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NicolaiLassen/langchain-adk
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/langchain-adk/

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - Core Concepts:
    - Agents: concepts/agents.md
    - Events: concepts/events.md
    - Runner & Sessions: concepts/runner-sessions.md
    - InvocationContext: concepts/invocation-context.md
  - Tools:
    - Overview: tools/overview.md
    - Long-Running Tools: tools/long-running.md
    - Tool Confirmation: tools/confirmation.md
  - Orchestration:
    - Composite Agents: orchestration/composite-agents.md
    - Planners: orchestration/planners.md
    - Skills: orchestration/skills.md
    - Prompts: orchestration/prompts.md
  - Runtime:
    - Streaming: runtime/streaming.md
    - Callbacks: runtime/callbacks.md
    - Tracing: runtime/tracing.md
    - Structured Output: runtime/structured-output.md
    - Human-in-the-Loop: runtime/human-in-the-loop.md
  - Composer:
    - Overview: composer/overview.md
  - Integrations:
    - A2A Protocol: integrations/a2a.md
    - MCP: integrations/mcp.md
  - Examples: examples.md
  - Architecture: architecture.md
